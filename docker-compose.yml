version: '3.9'

name: financeflow

services:

  postgres:
    image: postgres:16-alpine
    container_name: financeflow_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-financeflow}
      POSTGRES_USER: ${POSTGRES_USER:-financeflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-financeflow123}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-financeflow}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - financeflow_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: financeflow_api
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-financeflow}:${POSTGRES_PASSWORD:-financeflow123}@postgres:5432/${POSTGRES_DB:-financeflow}
      SECRET_KEY: ${SECRET_KEY:-supersecret-change-in-production}
      DEBUG: ${DEBUG:-false}
      CORS_ORIGINS: http://localhost,http://localhost:80,http://localhost:5173
    volumes:
      - ./backend:/app
    ports:
      - "9000:9000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - financeflow_net
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 9000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: /api
    container_name: financeflow_web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - financeflow_net

volumes:
  postgres_data:
    driver: local

networks:
  financeflow_net:
    driver: bridge
