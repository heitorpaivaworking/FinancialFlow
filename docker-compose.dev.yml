version: '3.9'

services:

  postgres:
    ports:
      - "5432:5432"

  backend:
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
    command: >
      sh -c "
        alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 9000 --reload
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:9000/api
    command: npm run dev -- --host 0.0.0.0
